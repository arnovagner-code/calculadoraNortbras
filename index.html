<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NORTBRAS ENGENHARIA</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --azul: #001a33; --ouro: #ff9900; --sucesso: #00c853; }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background-color: #0a0e12; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; color: #fff; padding: 10px; }
        
        .container { background: var(--azul); padding: 25px; border-radius: 20px; width: 100%; max-width: 480px; text-align: center; border: 2px solid var(--ouro); box-shadow: 0 10px 30px rgba(0,0,0,0.5); position: relative; }
        .logo { max-width: 90px; margin-bottom: 10px; border-radius: 50%; border: 2px solid var(--ouro); }
        h1 { font-size: 16px; color: var(--ouro); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid rgba(255,153,0,0.3); background: rgba(0,0,0,0.2); color: #fff; font-size: 24px; text-align: center; font-weight: bold; margin-bottom: 15px; outline: none; }
        
        .btns-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-calc { flex: 1; padding: 18px; background: var(--ouro); color: var(--azul); border: none; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .whatsapp-btn { flex: 1; background: var(--sucesso); color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 18px; border-radius: 12px; font-weight: 800; text-transform: uppercase; }
        
        .result { display: none; text-align: left; }
        .box-perfil { background: rgba(255,153,0,0.1); padding: 15px; border-radius: 15px; border-left: 6px solid var(--ouro); margin-bottom: 12px; }
        .box-sistema { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border-left: 6px solid var(--sucesso); }
        
        .val-destaque { font-size: 24px; font-weight: 800; color: var(--ouro); }
        .item-tecnico { display: flex; justify-content: space-between; margin: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 4px; font-size: 14px; }
        
        .investimento-box { text-align:center; padding: 15px 0; }
        .preco-final { font-size: 32px; font-weight: 900; color: #fff; }
        .btn-save { width: 100%; padding: 12px; background: #333; color: #fff; border: none; border-radius: 10px; margin-top: 10px; cursor: pointer; }

        /* ESTILO PARA PDF (IMPRESSÃO) */
        @media print {
            @page { margin: 0.5cm; }
            body { background: white !important; color: #000 !important; }
            .container { border: 1px solid #eee; box-shadow: none; max-width: 100%; width: 100%; background: white !important; padding: 10px; }
            h1, .val-destaque, .preco-final { color: #000 !important; }
            .box-perfil { background: #fffcf5 !important; border: 1px solid var(--ouro); border-left-width: 8px; color: black; }
            .box-sistema { background: #fafffa !important; border: 1px solid var(--sucesso); border-left-width: 8px; color: black; }
            .item-tecnico { border-bottom: 1px solid #ddd; color: black; }
            input, .btns-row, .btn-save { display: none !important; }
            .result { display: block !important; }
            .frase { color: #333 !important; border-top: 1px dashed #ccc; padding-top: 10px; }
            .logo { filter: brightness(0.8); }
        }
    </style>
</head>
<body>

<div class="container">
    <img src="logo_nortbras.jng.html.jpg" alt="Logo Nortbras" class="logo" onerror="this.style.display='none'">
    <h1>ENGENHARIA NORTBRAS</h1>

    <input type="number" id="valorConta" placeholder="VALOR DA CONTA (R$)" autofocus>

    <div class="btns-row">
        <button class="btn-calc" onclick="calcular()">DIMENSIONAR</button>
        <a href="https://wa.me/5593992241962" class="whatsapp-btn"><i class="fab fa-whatsapp"></i>&nbsp;CONTATO</a>
    </div>

    <div id="resultado" class="result">
        <div class="box-perfil">
            <h3 style="color: var(--ouro); font-size: 11px; margin:0; letter-spacing: 1px;">ANÁLISE DE CONSUMO</h3>
            <div id="consumoKwh" class="val-destaque">0 kWh</div>
            <p style="margin: 5px 0; font-size: 13px; font-weight: 600;">
                <i class="fas fa-check-circle" style="color:var(--ouro)"></i> Dimensionado sob medida para você.
            </p>
        </div>

        <div class="box-sistema">
            <h3 style="color: var(--sucesso); font-size: 11px; margin:0; letter-spacing: 1px;">SOLUÇÃO TÉCNICA SUGERIDA</h3>
            <div class="item-tecnico"><span>Potência Inversor:</span><span id="inversor" style="font-weight:700">0 kW</span></div>
            <div class="item-tecnico"><span>Nº de Painéis:</span><span id="placas" style="font-weight:700">0 un</span></div>
            <div class="item-tecnico"><span>Geração Mensal:</span><span id="geracaoReal" style="color:var(--sucesso); font-weight:700">0 kWh</span></div>
        </div>
        
        <div class="investimento-box">
            <span style="font-size: 11px; color: #888; font-weight: bold;">INVESTIMENTO ESTIMADO:</span>
            <div id="precoKit" class="preco-final">R$ 0,00</div>
        </div>

        <button class="btn-save" onclick="window.print()">SALVAR PROPOSTA (PDF)</button>
        <p class="frase" style="text-align:center; font-style:italic; color:var(--ouro); font-size:12px; margin-top:12px; font-weight: bold; line-height: 1.4;">
            "Nortbras Engenharia: Tecnologia de ponta e <br>compromisso com sua economia."
        </p>
    </div>
</div>

<script>
    function calcular() {
        const v = parseFloat(document.getElementById('valorConta').value);
        if (v > 0) {
            const kwh = v / 1.38;
            let p = Math.ceil((kwh / 30) / 1.92);
            if (v >= 1000 && p < 14) p = 14; 
            let valorPorPlaca = (v > 9000) ? 1180 : (v > 5600) ? 1150 : (p > 10) ? 1200 : 1350;
            const preco = p * valorPorPlaca;
            const inv = Math.round((p * 585) / 1000);
            const ger = ((p * 585 * 4.5 * 30) / 1000) * 0.82;

            document.getElementById('consumoKwh').innerText = kwh.toFixed(0) + " kWh";
            document.getElementById('placas').innerText = p + " un";
            document.getElementById('inversor').innerText = inv + " kW";
            document.getElementById('geracaoReal').innerText = ger.toFixed(0) + " kWh";
            document.getElementById('precoKit').innerText = preco.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
            document.getElementById('resultado').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }
    }
</script>
</body>
</html>
